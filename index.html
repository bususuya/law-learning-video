<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互动学习视频</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body { font-family: "Microsoft YaHei", sans-serif; background: #000; overflow: hidden; }
        .container { width: 100vw; height: 100vh; position: relative; }

        /* 封面 */
        .cover-wrapper {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: #1a1a2e; cursor: pointer;
        }
        .cover-side {
            flex: 0 0 33.33%; height: 100%;
            display: flex; align-items: center;
            padding: 0 20px;
        }
        .cover-side.left { justify-content: flex-end; }
        .cover-side.right { justify-content: flex-start; }
        .cover-side-text {
            writing-mode: vertical-rl; text-orientation: mixed;
            font-size: 32px; font-weight: bold; color: #fff;
            letter-spacing: 8px;
        }
        .cover-center {
            flex: 0 0 33.33%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative;
        }
        .cover-image {
            width: 100%; height: 100%;
            background: url("图1.jpg") center/contain no-repeat;
        }
        .cover-hint {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            color: #fff; background: rgba(0,0,0,0.6);
            padding: 10px 20px; border-radius: 8px; font-size: 18px; z-index: 5;
            white-space: nowrap;
        }
        .book-hotspot {
            position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9); border: 4px solid #fff; border-radius: 12px;
            padding: 20px 30px; color: #333; font-size: 22px; font-weight: bold;
            cursor: pointer; text-align: center;
            animation: pulse 1.5s infinite; z-index: 10; user-select: none;
        }
        .book-hotspot:hover { background: rgba(255, 255, 255, 1); }
        @keyframes pulse {
            0%,100% { box-shadow: 0 0 10px #fff; }
            50% { box-shadow: 0 0 30px #fff; }
        }

        /* 视频区域 */
        .video-container { display: none; position: absolute; inset: 0; background: #000; }
        .video-container video { width: 100%; height: 100%; object-fit: contain; }
        .video-error {
            display: none; position: absolute; inset: 0; background: #1a1a2e;
            flex-direction: column; justify-content: center; align-items: center;
            color: #fff; padding: 30px; text-align: center;
        }
        .video-error h3 { margin-bottom: 20px; font-size: 24px; }
        .video-error p { margin-bottom: 10px; color: #ccc; }
        .video-error code { background: #333; padding: 5px 10px; border-radius: 4px; }
        .restart-btn {
            margin-top: 20px; padding: 10px 25px;
            background: #e74c3c; color: white; border: none; border-radius: 8px;
            font-size: 16px; cursor: pointer;
        }
        .restart-btn:hover { background: #c0392b; }

        /* 题目遮罩 */
        .quiz-overlay {
            display: none; position: absolute; inset: 0;
            background: rgba(0, 0, 0, 0.88);
            justify-content: center; align-items: center; padding: 30px; z-index: 20;
        }
        .quiz-box {
            background: #fff; padding: 30px; border-radius: 15px;
            max-width: 650px; width: 100%;
        }
        .quiz-question { font-size: 20px; color: #222; margin-bottom: 25px; line-height: 1.6; }
        .quiz-options { display: flex; flex-direction: column; gap: 12px; }
        .quiz-options label {
            display: flex; align-items: center; padding: 14px 16px;
            background: #f5f5f5; border-radius: 8px; cursor: pointer;
            transition: background 0.2s; font-size: 16px;
        }
        .quiz-options label:hover { background: #e8e8e8; }
        .quiz-options input[type="radio"] { margin-right: 12px; transform: scale(1.2); }
        .submit-btn {
            margin-top: 20px; padding: 12px 30px;
            background: #e74c3c; color: white; border: none; border-radius: 8px;
            font-size: 16px; cursor: pointer;
        }
        .submit-btn:hover { background: #c0392b; }
        .result-message {
            margin-top: 20px; padding: 15px; border-radius: 8px;
            font-size: 18px; font-weight: bold; text-align: center; display: none;
        }
        .correct { background: #d4edda; color: #155724; }
        .incorrect { background: #f8d7da; color: #721c24; }

        /* 完成提示 */
        .complete-overlay {
            display: none; position: absolute; inset: 0;
            background: rgba(0, 0, 0, 0.88);
            justify-content: center; align-items: center; z-index: 30;
        }
        .complete-box {
            background: #fff; padding: 40px; border-radius: 15px;
            text-align: center; max-width: 400px; width: 90%;
        }
        .complete-box h2 { margin-bottom: 15px; color: #222; }
        .complete-box p { margin-bottom: 25px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 封面 -->
        <div class="cover-wrapper" id="coverWrapper">
            <div class="cover-side left">
                <div class="cover-side-text">普法互动小视频</div>
            </div>
            <div class="cover-center">
                <div class="cover-image"></div>
                <div class="book-hotspot" id="bookHotspot">点击此处开始</div>
            </div>
            <div class="cover-side right">
                <div class="cover-side-text">让我们一起来学习吧</div>
            </div>
        </div>

        <!-- 视频 -->
        <div class="video-container" id="videoContainer">
            <video id="videoPlayer" controls autoplay muted>
                <source id="videoSource" src="" type="video/mp4">
            </video>
            <div class="video-error" id="videoError">
                <h3>视频加载失败</h3>
                <p>请在项目目录下启动本地服务器：</p>
                <code>python -m http.server 8000</code>
                <p>然后访问 http://localhost:8000/index.html</p>
                <button class="restart-btn" id="restartBtn">重试</button>
            </div>
            <div class="quiz-overlay" id="quizOverlay">
                <div class="quiz-box">
                    <div class="quiz-question" id="quizQuestion"></div>
                    <div class="quiz-options" id="quizOptions"></div>
                    <button class="submit-btn" id="submitBtn">提交答案</button>
                    <div class="result-message" id="resultMessage"></div>
                </div>
            </div>
            <div class="complete-overlay" id="completeOverlay">
                <div class="complete-box">
                    <h2>学习完成！</h2>
                    <p>感谢您完成本次互动学习</p>
                    <button class="restart-btn" onclick="restartAll()">重新开始</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const quizData = {
            "1-1": { question: "视频中的行为是否符合法律规定？", options: ["A. 符合", "B. 不符合"], correct: 1, triggerTime: 30 },
            "1-2": { question: "视频中的行为是否侵犯了他人权益？", options: ["A. 没有侵犯", "B. 侵犯了"], correct: 1, triggerTime: 15 },
            "1-3": { question: "视频中的行为是否属于违法行为？", options: ["A. 是合法行为", "B. 是违法行为"], correct: 1, triggerTime: 29 },
            "1-4": { question: "视频中的行为是否应该受到法律制裁？", options: ["A. 不应该", "B. 应该"], correct: 1, triggerTime: 14 },
            "1-5": { question: "视频中的行为是否正确？", options: ["A. 正确", "B. 不正确"], correct: 1, triggerTime: 18 },
            "1-6": { question: "视频中的行为是否违反治安管理规定？", options: ["A. 没有违反", "B. 违反了"], correct: 1, triggerTime: 37 },
            "1-7": { question: "视频中的行为是否损害了公共利益？", options: ["A. 没有损害", "B. 损害了"], correct: 1, triggerTime: 24 },
            "1-8": { question: "视频中的行为是否符合社会公德？", options: ["A. 符合", "B. 不符合"], correct: 1, triggerTime: 30 },
            "1-9": { question: "视频中的行为是否需要承担法律责任？", options: ["A. 不需要", "B. 需要"], correct: 1, triggerTime: 20 },
            "1-10": { question: "视频中的行为是否构成犯罪？", options: ["A. 不构成", "B. 构成"], correct: 1, triggerTime: 40 },
            "2-1": { question: "向谁求助？", options: ["A. 陌生网警", "B. 自称可以追回资金的网络律师", "C. 黑客", "D. 110"], correct: 3, triggerTime: 12 },
            "2-2": { question: "符合要求吗？", options: ["A. 符合", "B. 不符合"], correct: 1, triggerTime: 9 },
            "2-3": { question: "你会怎么做？", options: ["A. 立刻转账", "B. 电话或者视频回拨", "C. 先转一部分，剩下一部分再说"], correct: 1, triggerTime: 19 },
            "2-4": { question: "你会怎么做？", options: ["A. 赶紧交费领取", "B. 诈骗陷阱直接忽略", "C. 先交一部分费用试试"], correct: 1, triggerTime: 15 },
            "2-5": { question: "你会相信吗？", options: ["A. 可以相信", "B. 不可以相信", "C. 不确定"], correct: 1, triggerTime: 17 },
            "2-6": { question: "你的决定是？", options: ["A. 相信并点击链接", "B. 不点击链接并使用官方APP查询", "C. 把链接转发给家人"], correct: 1, triggerTime: 19 },
            "2-7": { question: "你觉得靠谱吗？", options: ["A. 靠谱交完费用就能放款", "B. 不靠谱", "C. 先交一部分试试"], correct: 1, triggerTime: 16 },
            "2-8": { question: "网友带你投资你会？", options: ["A. 相信他", "B. 拒绝参与", "C. 小额投入试试"], correct: 1, triggerTime: 15 },
            "2-9": { question: "陌生电话要求你转账自证清白，你会？", options: ["A. 赶紧转账", "B. 绝不转账", "C. 按照对方要求提供相关信息"], correct: 1, triggerTime: 19 },
            "2-10": { question: "陌生号码要求你提供个人信息，你会？", options: ["A. 点击链接填写信息", "B. 忽略短信，不点击，不填写", "C. 先提供部分信息"], correct: 1, triggerTime: 19 }
        };

        const videoList = ["1-1", "1-2", "1-3", "1-4", "1-5", "1-6", "1-7", "1-8", "1-9", "1-10", "2-1", "2-2", "2-3", "2-4", "2-5", "2-6", "2-7", "2-8", "2-9", "2-10"];

        let currentVideo = null;
        let quizAnswered = false;
        let quizShown = false;

        document.getElementById('bookHotspot').addEventListener('click', startVideo);
        document.getElementById('restartBtn').addEventListener('click', startVideo);

        function startVideo() {
            currentVideo = videoList[Math.floor(Math.random() * videoList.length)];
            const videoSrc = currentVideo + '.mp4';

            document.getElementById('coverWrapper').style.display = 'none';
            document.getElementById('videoError').style.display = 'none';
            document.getElementById('videoContainer').style.display = 'block';
            document.getElementById('completeOverlay').style.display = 'none';

            const video = document.getElementById('videoPlayer');
            const source = document.getElementById('videoSource');
            source.src = videoSrc;
            video.load();

            quizAnswered = false;
            quizShown = false;
        }

        const video = document.getElementById('videoPlayer');

        video.addEventListener('loadedmetadata', function() {
            const data = quizData[currentVideo];
            if (video.duration && video.duration <= data.triggerTime) {
                data.triggerTime = Math.floor(video.duration * 0.8);
            }
            video.play().catch(function(e) {
                console.log('自动播放被阻止:', e);
            });
        });

        video.addEventListener('timeupdate', function() {
            if (!quizAnswered && !quizShown && video.currentTime > 0) {
                const data = quizData[currentVideo];
                if (video.currentTime >= data.triggerTime) {
                    video.pause();
                    showQuiz();
                    quizShown = true;
                }
            }
        });

        video.addEventListener('error', function() {
            document.getElementById('videoError').style.display = 'flex';
        });

        video.addEventListener('ended', function() {
            restartAll();
        });

        function showQuiz() {
            const data = quizData[currentVideo];
            document.getElementById('quizOverlay').style.display = 'flex';
            document.getElementById('quizQuestion').textContent = data.question;

            const optionsContainer = document.getElementById('quizOptions');
            optionsContainer.innerHTML = '';
            data.options.forEach((opt, i) => {
                const label = document.createElement('label');
                label.innerHTML = `<input type="radio" name="quiz" value="${i}"> ${opt}`;
                optionsContainer.appendChild(label);
            });

            document.getElementById('resultMessage').style.display = 'none';
            document.getElementById('submitBtn').style.display = 'block';
        }

        function restartAll() {
            currentIndex = 0;
            document.getElementById('completeOverlay').style.display = 'none';
            document.getElementById('videoContainer').style.display = 'none';
            document.getElementById('coverWrapper').style.display = 'flex';
        }

        document.getElementById('submitBtn').addEventListener('click', function() {
            const selected = document.querySelector('input[name="quiz"]:checked');
            if (!selected) { alert('请选择一个答案'); return; }

            const data = quizData[currentVideo];
            const userAnswer = parseInt(selected.value);
            const resultDiv = document.getElementById('resultMessage');

            resultDiv.style.display = 'block';
            if (userAnswer === data.correct) {
                resultDiv.textContent = '回答正确！';
                resultDiv.className = 'result-message correct';
            } else {
                resultDiv.textContent = '回答错误。正确答案是：' + data.options[data.correct];
                resultDiv.className = 'result-message incorrect';
            }
            document.getElementById('submitBtn').style.display = 'none';
            quizAnswered = true;

            setTimeout(() => {
                document.getElementById('quizOverlay').style.display = 'none';
                video.play();
            }, 3000);
        });
    </script>
</body>
</html>
